steps:
  - name: "find k8s namespace"
    type: script
    file: "$SERVICE_PATH/scripts/istio/fetch_provider_data"
    output:
      - name: K8S_NAMESPACE
        type: environment
  - name: "build context"
    type: script
    file: "$SERVICE_PATH/scripts/istio/build_context"
    output:
      - name: SERVICE_ID
        type: environment
      - name: SERVICE_SLUG
        type: environment
      - name: ACTION_ID
        type: environment
      - name: ACTION_NAME
        type: environment
      - name: ROUTES_JSON
        type: environment
      - name: PUBLIC_ROUTES_JSON
        type: environment
      - name: PRIVATE_ROUTES_JSON
        type: environment
      - name: K8S_NAMESPACE
        type: environment
      - name: APPLICATION_ID
        type: environment
      - name: AUTH_TYPE
        type: environment
      - name: COGNITO_USER_POOL_ARN
        type: environment
      - name: AVP_POLICY_STORE_ID
        type: environment
  - name: "build public httproute"
    type: script
    file: "$SERVICE_PATH/scripts/istio/build_httproute"
    configuration:
      VISIBILITY: "public"
    output:
      - name: HTTPROUTE_PUBLIC_FILE
        type: file
        file: "$OUTPUT_DIR/httproute-$SERVICE_ID-public.yaml"
  - name: "build private httproute"
    type: script
    file: "$SERVICE_PATH/scripts/istio/build_httproute"
    configuration:
      VISIBILITY: "private"
    output:
      - name: HTTPROUTE_PRIVATE_FILE
        type: file
        file: "$OUTPUT_DIR/httproute-$SERVICE_ID-private.yaml"
  - name: "manage policies"
    type: script
    file: "$SERVICE_PATH/scripts/common/manage_policies"
    configuration:
      ACTION: "apply"
  - name: apply
    type: script
    file: "$SERVICE_PATH/scripts/common/apply"
    configuration:
      ACTION: apply
      DRY_RUN: false
  - name: "store service results"
    type: script
    file: "$SERVICE_PATH/scripts/np/update_service_results"
